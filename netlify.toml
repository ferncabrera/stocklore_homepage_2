# Netlify configuration — overrides UI build settings once this repo is connected.

[build]
  command = "npm run build"
  publish = "dist"

# /blog was an empty placeholder page; its "updates" intent now lives on /roadmap.
[[redirects]]
  from = "/blog"
  to = "/roadmap"
  status = 301
  force = true

# Hashed build assets are immutable — cache forever.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
